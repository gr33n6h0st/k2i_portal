<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The k2i Academy Team - Lassonde School of Engineering</title>
    <style>
        :root {
            --bg-color: #06080c;
            --modal-bg: rgba(10, 14, 22, 0.96);
            --border-color: rgba(45, 54, 69, 0.4);
            --text-main: #f0f3f6;
            --text-muted: #6e7681;
            
            /* High-Tech Team Palette */
            --color-camp-lead: #00bcff;
            --color-camp: #00ffd2;
            --color-wil-lead: #ff007f;
            --color-wil: #9d4edd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #network-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            /* Default cursor is a standard pointer arrow now */
            cursor: default; 
            transition: filter 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body.modal-active #network-canvas {
            filter: blur(10px) brightness(0.25);
        }

        /* HUD Main Header */
        header {
            position: absolute;
            top: 35px;
            left: 35px;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.4s;
        }
        body.modal-active header { opacity: 0.1; }
        
        header h1 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 500;
        }
        header p {
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            margin-top: 5px;
        }

        /* Fixed Section Layout Labels */
        .sector-header {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.75rem;
            font-weight: 600;
            padding-bottom: 6px;
            width: 38%;
            transition: opacity 0.4s;
        }
        .sector-header::after {
            content: '';
            display: block;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, currentColor, transparent);
            margin-top: 6px;
            opacity: 0.25;
        }
        body.modal-active .sector-header { opacity: 0.05; }

        #header-camp-leads { top: 12%; left: 6%; color: var(--color-camp-lead); }
        #header-camp { top: 54%; left: 6%; color: var(--color-camp); }
        #header-wil-leads { top: 12%; left: 54%; color: var(--color-wil-lead); }
        #header-wil { top: 54%; left: 54%; color: var(--color-wil); }

        /* Centralized Modal Overlay */
        .modal-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 30;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(4px);
        }
        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-card {
            background: var(--modal-bg);
            border: 1px solid var(--border-color);
            width: 440px;
            padding: 40px;
            border-radius: 6px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: scale(0.95);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        .modal-overlay.open .modal-card {
            transform: scale(1);
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.4rem;
            cursor: pointer;
        }
        .close-btn:hover { color: var(--text-main); }

        .modal-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            padding: 4px;
            border: 1px solid transparent;
            margin-bottom: 20px;
            object-fit: cover;
        }
        .modal-name {
            font-size: 1.4rem;
            font-weight: 400;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .modal-tag {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 4px 14px;
            border-radius: 2px;
            margin-bottom: 24px;
            font-weight: 600;
        }
        .modal-bio {
            font-size: 0.85rem;
            line-height: 1.6;
            color: #afb8c1;
            text-align: center;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            width: 100%;
        }

        .grid-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.008) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.008) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body>

    <div class="grid-overlay"></div>
    <canvas id="network-canvas"></canvas>

    <header>
        <h1>The k2i Academy Team</h1>
        <p>Lassonde School of Engineering // INFRASTRUCTURE GRID</p>
    </header>

    <div id="header-camp-leads" class="sector-header">Community Camp Leads</div>
    <div id="header-camp" class="sector-header">Community Camp Mentors</div>
    <div id="header-wil-leads" class="sector-header">Work-Integrated Learning Leads</div>
    <div id="header-wil" class="sector-header">Work-Integrated Learning Mentors</div>

    <div id="modal-overlay" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-card">
            <button class="close-btn" onclick="forceCloseModal()">×</button>
            <img id="modal-img" class="modal-avatar" src="" alt="">
            <h2 id="modal-name" class="modal-name"></h2>
            <span id="modal-tag" class="modal-tag"></span>
            <p id="modal-bio" class="modal-bio"></p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('network-canvas');
        const ctx = canvas.getContext('2d');
        const modal = document.getElementById('modal-overlay');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const categories = {
            "Community Camp Leads": { color: "#00bcff", bg: "rgba(0,188,255,0.08)", targetX: 0.25, targetY: 0.32 },
            "Community Camp Mentors": { color: "#00ffd2", bg: "rgba(0,255,210,0.08)", targetX: 0.25, targetY: 0.72 },
            "Work-Integrated Learning Leads": { color: "#ff007f", bg: "rgba(255,0,127,0.08)", targetX: 0.75, targetY: 0.32 },
            "Work-Integrated Learning Mentors": { color: "#9d4edd", bg: "rgba(157,78,221,0.08)", targetX: 0.75, targetY: 0.72 }
        };

        let nodes = [];
        let hoveredNode = null;

        // Ultra-Smooth Physics Configurations (High friction dampening removes jitters entirely)
        const friction = 0.75; 
        const springStrength = 0.018; 

        function generateData() {
            const catKeys = Object.keys(categories);
            const totalPeople = 45;

            for (let i = 0; i < totalPeople; i++) {
                let category;
                
                // Distributing exactly 5 Leads per team, remaining are mentors
                if (i < 5) category = catKeys[0];        // 5 Community Camp Leads
                else if (i < 22) category = catKeys[1];  // 17 Community Camp Mentors
                else if (i < 27) category = catKeys[2];  // 5 WIL Leads
                else category = catKeys[3];              // 18 WIL Mentors

                let homeX = width * categories[category].targetX;
                let homeY = height * categories[category].targetY;

                // Organized golden-ratio layout patterns per segment to minimize natural text overlapping
                let angle = (i * 1.4) * Math.PI;
                let radiusOffset = 45 + ((i % 18) * 7.5);

                let initialX = homeX + Math.cos(angle) * radiusOffset;
                let initialY = homeY + Math.sin(angle) * radiusOffset;

                nodes.push({
                    id: i,
                    name: `Team Member ${i + 1}`,
                    category: category,
                    bio: `Professional profile matrix data for k2i Academy team asset. Specialized in delivering engineering programming under the Lassonde School framework.`,
                    imgUrl: `https://i.pravatar.cc/150?img=${(i % 70) + 1}`,
                    x: initialX,
                    y: initialY,
                    homeX: initialX,
                    homeY: initialY,
                    vx: 0, vy: 0,
                    baseRadius: 26,
                    radius: 26,
                    targetRadius: 26,
                    imgObj: null
                });
            }

            nodes.forEach(node => {
                const img = new Image();
                img.src = node.imgUrl;
                img.onload = () => { node.imgObj = img; };
            });
        }

        function updatePhysics() {
            if (document.body.classList.contains('modal-active')) return;

            for (let i = 0; i < nodes.length; i++) {
                let n1 = nodes[i];

                // 1. Fluid Return-to-Home Anchor Linear Calculation
                let homeDX = n1.homeX - n1.x;
                let homeDY = n1.homeY - n1.y;
                n1.vx += homeDX * springStrength;
                n1.vy += homeDY * springStrength;

                // 2. Continuous Fluid Wave Displacement (Dampened Push)
                if (hoveredNode && hoveredNode !== n1) {
                    let hdx = n1.x - hoveredNode.x;
                    let hdy = n1.y - hoveredNode.y;
                    let hdist = Math.hypot(hdx, hdy);
                    let pushRadius = 150; // Dynamic push tracking radius

                    if (hdist < pushRadius && hdist > 0) {
                        let force = (pushRadius - hdist) / pushRadius;
                        // Smooth cubic easing curves completely strip out hard physics snap/jitter
                        let smoothForce = force * force * force * 9; 
                        n1.vx += (hdx / hdist) * smoothForce;
                        n1.vy += (hdy / hdist) * smoothForce;
                    }
                }

                // 3. Inter-Node Protection Field
                for (let j = i + 1; j < nodes.length; j++) {
                    let n2 = nodes[j];
                    let dx = n2.x - n1.x;
                    let dy = n2.y - n1.y;
                    let dist = Math.hypot(dx, dy);
                    let bufferDist = n1.radius + n2.radius + 28;

                    if (dist < bufferDist && dist > 0) {
                        let overlapForce = (bufferDist - dist) * 0.05;
                        n1.vx -= (dx / dist) * overlapForce;
                        n1.vy -= (dy / dist) * overlapForce;
                        n2.vx += (dx / dist) * overlapForce;
                        n2.vy += (dy / dist) * overlapForce;
                    }
                }

                // Inject processing loops onto coordinates
                n1.vx *= friction;
                n1.vy *= friction;
                n1.x += n1.vx;
                n1.y += n1.vy;

                // Interpolate circle scale values
                n1.targetRadius = (hoveredNode === n1) ? 44 : n1.baseRadius;
                n1.radius += (n1.targetRadius - n1.radius) * 0.15;
            }
        }

        function draw() {
            updatePhysics();
            ctx.clearRect(0, 0, width, height);

            // 1. Draw Clean Linked Category Web Connections
            Object.keys(categories).forEach(catKey => {
                let catNodes = nodes.filter(n => n.category === catKey);
                ctx.lineWidth = 1;
                ctx.strokeStyle = categories[catKey].color + "26"; // Faint tech linking paths

                ctx.beginPath();
                for (let i = 0; i < catNodes.length; i++) {
                    for (let j = i + 1; j < catNodes.length; j++) {
                        let dist = Math.hypot(catNodes[j].x - catNodes[i].x, catNodes[j].y - catNodes[i].y);
                        if (dist < 160) { 
                            ctx.moveTo(catNodes[i].x, catNodes[i].y);
                            ctx.lineTo(catNodes[j].x, catNodes[j].y);
                        }
                    }
                }
                ctx.stroke();
            });

            // 2. Draw Floating Personnel Core Units
            nodes.forEach(node => {
                ctx.save();
                ctx.translate(node.x, node.y);

                const accentColor = categories[node.category].color;
                const isHovered = (hoveredNode === node);

                // High Tech Target Rings
                ctx.beginPath();
                ctx.arc(0, 0, node.radius + 4, 0, Math.PI * 2);
                ctx.strokeStyle = isHovered ? accentColor : "rgba(255, 255, 255, 0.07)";
                ctx.lineWidth = isHovered ? 2 : 1;
                ctx.stroke();

                if (isHovered) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = accentColor;
                }

                // Avatar Graphic Mapping Frame
                ctx.beginPath();
                ctx.arc(0, 0, node.radius, 0, Math.PI * 2);
                ctx.fillStyle = "#0c1017";
                ctx.fill();
                ctx.clip();

                if (node.imgObj) {
                    let img = node.imgObj;
                    let size = node.radius * 2;
                    let hRatio = img.width / size;
                    let vRatio = img.height / size;
                    let ratio  = Math.min(hRatio, vRatio);
                    let sWidth = size * ratio;
                    let sHeight = size * ratio;
                    let sX = (img.width - sWidth) / 2;
                    let sY = (img.height - sHeight) / 2;
                    
                    ctx.drawImage(img, sX, sY, sWidth, sHeight, -node.radius, -node.radius, size, size);
                }
                ctx.restore();

                // Text Display Render
                if (isHovered) {
                    ctx.font = "bold 10px sans-serif";
                    ctx.fillStyle = "#ffffff";
                    ctx.textAlign = "center";
                    ctx.letterSpacing = "1px";
                    ctx.fillText(node.name.toUpperCase(), node.x, node.y + node.radius + 18);
                }
            });

            requestAnimationFrame(draw);
        }

        function getNodeAtPos(x, y) {
            return nodes.find(node => Math.hypot(node.x - x, node.y - y) < node.radius + 4);
        }

        // Click Event Parser
        canvas.addEventListener('click', (e) => {
            const clicked = getNodeAtPos(e.clientX, e.clientY);
            if (clicked) {
                openModal(clicked);
            }
        });

        // Dynamic Cursor Mapping Handling (Only changes to finger pointer over faces)
        canvas.addEventListener('mousemove', (e) => {
            hoveredNode = getNodeAtPos(e.clientX, e.clientY);
            
            if (hoveredNode) {
                canvas.style.cursor = 'pointer'; // Finger pointer ONLY on nodes
            } else {
                canvas.style.cursor = 'default'; // Regular arrow on background
            }
        });

        // Presentation Window Layer Operations
        function openModal(node) {
            document.getElementById('modal-img').src = node.imgUrl;
            document.getElementById('modal-img').style.borderColor = categories[node.category].color;
            document.getElementById('modal-name').innerText = node.name;
            
            const tag = document.getElementById('modal-tag');
            tag.innerText = node.category;
            tag.style.color = categories[node.category].color;
            tag.style.background = categories[node.category].bg;

            document.getElementById('modal-bio').innerText = node.bio;
            
            document.body.classList.add('modal-active');
            modal.classList.add('open');
        }

        function forceCloseModal() {
            modal.classList.remove('open');
            document.body.classList.remove('modal-active');
        }

        function closeModal(e) {
            if (e.target === modal) {
                forceCloseModal();
            }
        }

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            nodes = [];
            generateData();
        });

        generateData();
        requestAnimationFrame(draw);
    </script>
</body>
</html>
