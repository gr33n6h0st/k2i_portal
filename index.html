<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The k2i Academy Team - Lassonde School of Engineering</title>
    <style>
        :root {
            --bg-color: #06080c;
            --modal-bg: rgba(10, 14, 22, 0.98);
            --border-color: rgba(45, 54, 69, 0.5);
            --text-main: #f0f3f6;
            --text-muted: #6e7681;
            
            --color-camp-lead: #00bcff;
            --color-camp: #00ffd2;
            --color-wil-lead: #ff007f;
            --color-wil: #9d4edd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #network-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: default; 
            transition: filter 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body.modal-active #network-canvas {
            filter: blur(12px) brightness(0.2);
        }

        header {
            position: absolute;
            top: 35px;
            left: 35px;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.4s;
        }
        body.modal-active header { opacity: 0.05; }
        
        header h1 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 500;
        }
        header p {
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            margin-top: 5px;
        }

        .sector-header {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.75rem;
            font-weight: 600;
            padding-bottom: 6px;
            width: 42%;
            transition: opacity 0.4s;
        }
        .sector-header::after {
            content: '';
            display: block;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, currentColor, transparent);
            margin-top: 6px;
            opacity: 0.25;
        }
        body.modal-active .sector-header { opacity: 0.03; }

        /* Spread headers out across the full canvas width */
        #header-camp-leads { top: 10%; left: 6%; color: var(--color-camp-lead); }
        #header-camp { top: 52%; left: 6%; color: var(--color-camp); }
        #header-wil-leads { top: 10%; left: 54%; color: var(--color-wil-lead); }
        #header-wil { top: 52%; left: 54%; color: var(--color-wil); }

        /* Widescreen Dossier Modal Overlay */
        .modal-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 30;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(6px);
        }
        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        
        .modal-card {
            background: var(--modal-bg);
            border: 1px solid var(--border-color);
            width: 750px;
            min-height: 280px;
            padding: 45px;
            border-radius: 8px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.85);
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 40px;
            transform: scale(0.94);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        .modal-overlay.open .modal-card {
            transform: scale(1);
        }
        .close-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.6rem;
            cursor: pointer;
            line-height: 1;
        }
        .close-btn:hover { color: var(--text-main); }

        .modal-left {
            flex-shrink: 0;
        }
        .modal-avatar {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            padding: 6px;
            border: 2px solid transparent;
            object-fit: cover;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        
        .modal-right {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }
        .modal-name {
            font-size: 1.8rem;
            font-weight: 400;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        .modal-tag {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            padding: 5px 16px;
            border-radius: 3px;
            margin-bottom: 20px;
            font-weight: 600;
            display: inline-block;
        }
        .modal-bio {
            font-size: 0.9rem;
            line-height: 1.7;
            color: #afb8c1;
            border-top: 1px solid var(--border-color);
            padding-top: 18px;
            width: 100%;
        }

        .grid-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.006) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.006) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body>

    <div class="grid-overlay"></div>
    <canvas id="network-canvas"></canvas>

    <header>
        <h1>The k2i Academy Team</h1>
        <p>Lassonde School of Engineering // INFRASTRUCTURE GRID</p>
    </header>

    <div id="header-camp-leads" class="sector-header">Community Camp Leads</div>
    <div id="header-camp" class="sector-header">Community Camp Mentors</div>
    <div id="header-wil-leads" class="sector-header">Work-Integrated Learning Leads</div>
    <div id="header-wil" class="sector-header">Work-Integrated Learning Mentors</div>

    <div id="modal-overlay" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-card">
            <button class="close-btn" onclick="forceCloseModal()">×</button>
            <div class="modal-left">
                <img id="modal-img" class="modal-avatar" src="" alt="">
            </div>
            <div class="modal-right">
                <h2 id="modal-name" class="modal-name"></h2>
                <span id="modal-tag" class="modal-tag"></span>
                <p id="modal-bio" class="modal-bio"></p>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('network-canvas');
        const ctx = canvas.getContext('2d');
        const modal = document.getElementById('modal-overlay');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // Spread targets out significantly across the full width and height
        const categories = {
            "Community Camp Leads": { color: "#00bcff", bg: "rgba(0,188,255,0.08)", targetX: 0.26, targetY: 0.30, circleRadius: 110 },
            "Community Camp Mentors": { color: "#00ffd2", bg: "rgba(0,255,210,0.08)", targetX: 0.26, targetY: 0.74, innerRadius: 90, outerRadius: 170 },
            "Work-Integrated Learning Leads": { color: "#ff007f", bg: "rgba(255,0,127,0.08)", targetX: 0.74, targetY: 0.30, circleRadius: 110 },
            "Work-Integrated Learning Mentors": { color: "#9d4edd", bg: "rgba(157,78,221,0.08)", targetX: 0.74, targetY: 0.74, innerRadius: 90, outerRadius: 170 }
        };

        let nodes = [];
        let hoveredNode = null;

        // Cinematic linear interpolation factor for completely non-vibrational movement
        const easeFactor = 0.10; 

        function generateData() {
            nodes = [];
            const catKeys = Object.keys(categories);
            const totalPeople = 45;

            let groupTrackers = { "Community Camp Leads": 0, "Community Camp Mentors": 0, "Work-Integrated Learning Leads": 0, "Work-Integrated Learning Mentors": 0 };

            for (let i = 0; i < totalPeople; i++) {
                let category;
                if (i < 5) category = catKeys[0];
                else if (i < 22) category = catKeys[1];
                else if (i < 27) category = catKeys[2];
                else category = catKeys[3];

                let config = categories[category];
                let idx = groupTrackers[category]++;
                
                let homeX, homeY;

                // 1. Expanded Circle Design for Leads (using full space)
                if (category.includes("Leads")) {
                    let angle = (idx / 5) * Math.PI * 2 - Math.PI / 2; 
                    homeX = (width * config.targetX) + Math.cos(angle) * config.circleRadius;
                    homeY = (height * config.targetY) + Math.sin(angle) * config.circleRadius;
                } 
                // 2. Expanded Concentric Circle Layout for Mentors
                else {
                    let ringIndex = idx % 2; 
                    let radius = ringIndex === 0 ? config.innerRadius : config.outerRadius; 
                    let nodesInRing = ringIndex === 0 ? 6 : 11;
                    
                    let angle = (idx / nodesInRing) * Math.PI * 2;
                    homeX = (width * config.targetX) + Math.cos(angle) * radius;
                    homeY = (height * config.targetY) + Math.sin(angle) * radius;
                }

                nodes.push({
                    id: i,
                    name: `Staff Member ${i + 1}`,
                    category: category,
                    bio: `Dossier overview data for k2i Academy team asset. Specialized in delivering engineering programming under the Lassonde School framework. External infrastructure matrix component.`,
                    imgUrl: `https://i.pravatar.cc/150?img=${(i % 70) + 1}`,
                    x: homeX,
                    y: homeY,
                    homeX: homeX,
                    homeY: homeY,
                    baseRadius: 26,
                    radius: 26,
                    targetRadius: 26,
                    imgObj: null
                });
            }

            nodes.forEach(node => {
                const img = new Image();
                img.src = node.imgUrl;
                img.onload = () => { node.imgObj = img; };
            });
        }

        function updatePhysics() {
            if (document.body.classList.contains('modal-active')) return;

            for (let i = 0; i < nodes.length; i++) {
                let node = nodes[i];

                let targetX = node.homeX;
                let targetY = node.homeY;

                // Smooth virtual mathematical lens distortion (No rigid structural bouncing)
                if (hoveredNode && hoveredNode !== node) {
                    let dx = node.homeX - hoveredNode.homeX;
                    let dy = node.homeY - hoveredNode.homeY;
                    let dist = Math.hypot(dx, dy);
                    
                    // Increased push radius match to fit the new spacious design layout
                    let pushRadius = 220; 

                    if (dist < pushRadius && dist > 0) {
                        // Gentle, pure sine wave dropoff entirely removes structural jitter
                        let strength = Math.sin((1 - dist / pushRadius) * Math.PI * 0.5) * 55;
                        targetX += (dx / dist) * strength;
                        targetY += (dy / dist) * strength;
                    }
                }

                // Smooth linear interpolation (lerp) onto targets
                node.x += (targetX - node.x) * easeFactor;
                node.y += (targetY - node.y) * easeFactor;

                // Dynamic sizing map transformations on hover targeting
                node.targetRadius = (hoveredNode === node) ? 44 : node.baseRadius;
                node.radius += (node.targetRadius - node.radius) * 0.15;
            }
        }

        function draw() {
            updatePhysics();
            ctx.clearRect(0, 0, width, height);

            // 1. Draw Geometric Technical Ring Guides
            Object.keys(categories).forEach(catKey => {
                let config = categories[catKey];
                ctx.lineWidth = 1;
                ctx.strokeStyle = config.color + "12"; 
                
                if (catKey.includes("Leads")) {
                    ctx.beginPath();
                    ctx.arc(width * config.targetX, height * config.targetY, config.circleRadius, 0, Math.PI * 2);
                    ctx.stroke();
                } else {
                    // Concentric background geometric guides for the mentors
                    ctx.beginPath();
                    ctx.arc(width * config.targetX, height * config.targetY, config.innerRadius, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(width * config.targetX, height * config.targetY, config.outerRadius, 0, Math.PI * 2);
                    ctx.stroke();
                }
            });

            // 2. Draw Clean Network Line Connections
            Object.keys(categories).forEach(catKey => {
                let catNodes = nodes.filter(n => n.category === catKey);
                ctx.lineWidth = 1;
                ctx.strokeStyle = categories[catKey].color + "18"; 

                ctx.beginPath();
                for (let i = 0; i < catNodes.length; i++) {
                    for (let j = i + 1; j < catNodes.length; j++) {
                        let dist = Math.hypot(catNodes[j].x - catNodes[i].x, catNodes[j].y - catNodes[i].y);
                        // Open spacing thresholds allow clean cross-network structural mapping lines
                        if (dist < 210) { 
                            ctx.moveTo(catNodes[i].x, catNodes[i].y);
                            ctx.lineTo(catNodes[j].x, catNodes[j].y);
                        }
                    }
                }
                ctx.stroke();
            });

            // 3. Render Avatars
            nodes.forEach(node => {
                ctx.save();
                ctx.translate(node.x, node.y);

                const accentColor = categories[node.category].color;
                const isHovered = (hoveredNode === node);

                ctx.beginPath();
                ctx.arc(0, 0, node.radius + 4, 0, Math.PI * 2);
                ctx.strokeStyle = isHovered ? accentColor : "rgba(255, 255, 255, 0.07)";
                ctx.lineWidth = isHovered ? 2 : 1;
                ctx.stroke();

                if (isHovered) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = accentColor;
                }

                ctx.beginPath();
                ctx.arc(0, 0, node.radius, 0, Math.PI * 2);
                ctx.fillStyle = "#0c1017";
                ctx.fill();
                ctx.clip();

                if (node.imgObj) {
                    let img = node.imgObj;
                    let size = node.radius * 2;
                    let hRatio = img.width / size;
                    let vRatio = img.height / size;
                    let ratio  = Math.min(hRatio, vRatio);
                    let sWidth = size * ratio;
                    let sHeight = size * ratio;
                    let sX = (img.width - sWidth) / 2;
                    let sY = (img.height - sHeight) / 2;
                    
                    ctx.drawImage(img, sX, sY, sWidth, sHeight, -node.radius, -node.radius, size, size);
                }
                ctx.restore();

                if (isHovered) {
                    ctx.font = "bold 10px sans-serif";
                    ctx.fillStyle = "#ffffff";
                    ctx.textAlign = "center";
                    ctx.letterSpacing = "1px";
                    ctx.shadowBlur = 4;
                    ctx.shadowColor = "#000000";
                    ctx.fillText(node.name.toUpperCase(), node.x, node.y + node.radius + 18);
                }
            });

            requestAnimationFrame(draw);
        }

        function getNodeAtPos(x, y) {
            return nodes.find(node => Math.hypot(node.x - x, node.y - y) < node.radius + 4);
        }

        canvas.addEventListener('click', (e) => {
            const clicked = getNodeAtPos(e.clientX, e.clientY);
            if (clicked) openModal(clicked);
        });

        canvas.addEventListener('mousemove', (e) => {
            hoveredNode = getNodeAtPos(e.clientX, e.clientY);
            canvas.style.cursor = hoveredNode ? 'pointer' : 'default';
        });

        function openModal(node) {
            document.getElementById('modal-img').src = node.imgUrl;
            document.getElementById('modal-img').style.borderColor = categories[node.category].color;
            document.getElementById('modal-name').innerText = node.name;
            
            const tag = document.getElementById('modal-tag');
            tag.innerText = node.category;
            tag.style.color = categories[node.category].color;
            tag.style.background = categories[node.category].bg;

            document.getElementById('modal-bio').innerText = node.bio;
            
            document.body.classList.add('modal-active');
            modal.classList.add('open');
        }

        function forceCloseModal() {
            modal.classList.remove('open');
            document.body.classList.remove('modal-active');
        }

        function closeModal(e) {
            if (e.target === modal) forceCloseModal();
        }

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            generateData();
        });

        generateData();
        requestAnimationFrame(draw);
    </script>
</body>
</html>
