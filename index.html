<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The k2i Academy Team - 3D Matrix</title>
    <style>
        :root {
            --bg-color: #050508;
            --modal-bg: rgba(10, 14, 22, 0.98);
            --border-color: rgba(45, 54, 69, 0.5);
            --text-main: #f0f3f6;
            --text-muted: #6e7681;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-main); overflow: hidden; width: 100vw; height: 100vh; user-select: none; }

        /* Improved Nebula Starfield */
        #stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(40, 20, 60, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(20, 50, 60, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(10, 10, 20, 1) 0%, #050508 100%),
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px) 50px 50px / 500px 500px,
                radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 2px) 200px 100px / 400px 400px;
            background-color: #050508;
        }

        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; cursor: grab; }
        body.modal-active #canvas-container { filter: blur(10px) brightness(0.3); pointer-events: none; }

        header { position: absolute; top: 35px; left: 35px; z-index: 10; pointer-events: none; }
        header h1 { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 3px; font-weight: 500; }
        header p { font-size: 0.65rem; color: var(--text-muted); letter-spacing: 1.5px; margin-top: 5px; }

        .hud-legend { position: absolute; bottom: 40px; left: 35px; z-index: 10; display: flex; flex-direction: column; gap: 12px; }
        .legend-item { display: flex; align-items: center; gap: 10px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
        .legend-color { width: 12px; height: 12px; border-radius: 50%; }

        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 30; background: rgba(0, 0, 0, 0.6); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(4px); }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal-card { background: var(--modal-bg); border: 1px solid var(--border-color); width: 500px; padding: 40px; border-radius: 8px; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .modal-name { font-size: 1.5rem; margin-bottom: 10px; }
        .modal-tag { font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 20px; display: block; }
        .modal-bio { font-size: 0.9rem; line-height: 1.6; border-top: 1px solid #333; padding-top: 20px; }
        .close-btn { margin-top: 25px; background: transparent; border: 1px solid #444; color: white; padding: 8px 16px; cursor: pointer; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="stars"></div>
    <div id="canvas-container"></div>

    <header>
        <h1>The k2i Academy Team</h1>
        <p>Lassonde School of Engineering // 3D SPHERICAL MATRIX</p>
    </header>

    <div class="hud-legend">
        <div class="legend-item"><div class="legend-color" style="background: #00bcff"></div>Community Camp Leads</div>
        <div class="legend-item"><div class="legend-color" style="background: #00ffd2"></div>Community Camp Mentors</div>
        <div class="legend-item"><div class="legend-color" style="background: #ff007f"></div>Work-Integrated Learning Leads</div>
        <div class="legend-item"><div class="legend-color" style="background: #9d4edd"></div>Work-Integrated Learning Mentors</div>
    </div>

    <div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h2 id="modal-name" class="modal-name"></h2>
            <span id="modal-tag" class="modal-tag"></span>
            <p id="modal-bio" class="modal-bio"></p>
            <button class="close-btn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        const teamData = [
            { name: "Michael D'Ambrosi", cat: "Community Camp Leads", bio: "Community Camp Lead" },
            { name: "Talia Palermo", cat: "Community Camp Leads", bio: "Community Camp Lead" },
            { name: "Bamdad Ababaei", cat: "Community Camp Mentors", bio: "Engineering" },
            { name: "Leon Li", cat: "Community Camp Mentors", bio: "Computer Science for Software Development" },
            { name: "Emeline Williams", cat: "Community Camp Mentors", bio: "Honours Bachelor of Health Sciences" },
            { name: "Sabriha Amin", cat: "Community Camp Mentors", bio: "Community Camp Mentor" },
            { name: "Cameron Jackson", cat: "Community Camp Mentors", bio: "Mechatronic Engineering" },
            { name: "Camille Jurik", cat: "Community Camp Mentors", bio: "Biomedical Science" },
            { name: "Seila Bak", cat: "Community Camp Mentors", bio: "Digital Media" },
            { name: "Brandon Smart", cat: "Work-Integrated Learning Leads", bio: "Computer Engineering - Faculty of Education" },
            { name: "Hanifah Lameed", cat: "Work-Integrated Learning Leads", bio: "Work-Integrated Learning Lead" },
            { name: "Sidney Liu", cat: "Work-Integrated Learning Leads", bio: "Work-Integrated Learning Lead" },
            { name: "Elizabeth Ghreir", cat: "Work-Integrated Learning Leads", bio: "Work-Integrated Learning Lead" },
            { name: "Sofie Khan", cat: "Work-Integrated Learning Leads", bio: "Work-Integrated Learning Lead" },
            { name: "Bofina Manochehrzadeh", cat: "Work-Integrated Learning Leads", bio: "Work-Integrated Learning Lead" },
            { name: "Anusha Masroor", cat: "Work-Integrated Learning Leads", bio: "Work-Integrated Learning Lead" },
            { name: "Conan Lee", cat: "Work-Integrated Learning Leads", bio: "Work-Integrated Learning Lead" },
            { name: "Shariah Mirza", cat: "Work-Integrated Learning Mentors", bio: "Computer Science" },
            { name: "Stella Malik", cat: "Work-Integrated Learning Mentors", bio: "Environmental Management" },
            { name: "Paola Tenaglia", cat: "Work-Integrated Learning Mentors", bio: "Medical Sciences" },
            { name: "Mithil Kansara", cat: "Work-Integrated Learning Mentors", bio: "Mechanical Engineering" },
            { name: "Fairuz Jahan", cat: "Work-Integrated Learning Mentors", bio: "Computer Science" },
            { name: "Sakshi Sharma", cat: "Work-Integrated Learning Mentors", bio: "Computer Engineering" },
            { name: "Saif Alsafadi", cat: "Work-Integrated Learning Mentors", bio: "Electrical Engineering" },
            { name: "Rithika Rose Samson", cat: "Work-Integrated Learning Mentors", bio: "Mechatronics Engineering" },
            { name: "Danya Shafi", cat: "Work-Integrated Learning Mentors", bio: "Psychology & Biology" },
            { name: "Rithik Kumanan", cat: "Work-Integrated Learning Mentors", bio: "Digital Media Game Development" },
            { name: "Dan Solomon", cat: "Work-Integrated Learning Mentors", bio: "Statistics" },
            { name: "Sadia Jahan Shifa", cat: "Work-Integrated Learning Mentors", bio: "Computer Engineering" },
            { name: "Brian Chen", cat: "Work-Integrated Learning Mentors", bio: "Electrical Engineering" },
            { name: "Niharika Tripathi", cat: "Work-Integrated Learning Mentors", bio: "Electrical Engineering" },
            { name: "Aryan Dhanji", cat: "Work-Integrated Learning Mentors", bio: "Computer Engineering" },
            { name: "Ethan St. Louis", cat: "Work-Integrated Learning Mentors", bio: "Computer Engineering" },
            { name: "Neha Sharma", cat: "Work-Integrated Learning Mentors", bio: "Software Engineering" },
            { name: "Katelyn Yip", cat: "Work-Integrated Learning Mentors", bio: "Engineering" },
            { name: "Sami Ali", cat: "Work-Integrated Learning Mentors", bio: "Computer Science" },
            { name: "Raley Terro", cat: "Work-Integrated Learning Mentors", bio: "Computing (Honours)" },
            { name: "Mowmita Zannat", cat: "Work-Integrated Learning Mentors", bio: "Bachelor of Science - Biology" },
            { name: "Arisa Arzan Pour", cat: "Work-Integrated Learning Mentors", bio: "Computer Science" },
            { name: "Rafia Oishee", cat: "Work-Integrated Learning Mentors", bio: "Chemical Engineering" },
            { name: "Mirza Baig", cat: "Work-Integrated Learning Mentors", bio: "Software Engineering" },
            { name: "AARON XAVIER GONSALVES", cat: "Work-Integrated Learning Mentors", bio: "Electrical Engineering" },
            { name: "Heetva Gandhi", cat: "Work-Integrated Learning Mentors", bio: "Life Sciences" },
            { name: "Hanna Cole", cat: "Work-Integrated Learning Mentors", bio: "Earth Science, Geophysics" },
            { name: "Jethro Wignaraj", cat: "Work-Integrated Learning Mentors", bio: "Mechanical Engineering" },
            { name: "Anagha Koroth", cat: "Work-Integrated Learning Mentors", bio: "Work-Integrated Learning Mentor" },
            { name: "Westley Wong", cat: "Work-Integrated Learning Mentors", bio: "Computer Science For Software Development" }
        ];

        let scene, camera, renderer, globeGroup, nodes = [];
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            globeGroup = new THREE.Group();
            scene.add(globeGroup);

            teamData.forEach((p, i) => {
                const phi = Math.acos(1 - 2 * (i + 0.5) / teamData.length);
                const theta = Math.PI * (1 + Math.sqrt(5)) * (i + 0.5);
                const x = 5 * Math.sin(phi) * Math.cos(theta);
                const y = 5 * Math.sin(phi) * Math.sin(theta);
                const z = 5 * Math.cos(phi);

                let color = p.cat.includes("Community Camp") ? (p.cat.includes("Leads") ? 0x00bcff : 0x00ffd2) : (p.cat.includes("Leads") ? 0xff007f : 0x9d4edd);
                
                const mesh = new THREE.Mesh(new THREE.CircleGeometry(0.3, 32), new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide }));
                mesh.position.set(x, y, z);
                mesh.lookAt(0,0,0);
                mesh.userData = p;
                globeGroup.add(mesh);
                nodes.push(mesh);
            });

            animate();
            window.addEventListener('click', onMouseClick);
        }

        function animate() {
            requestAnimationFrame(animate);
            globeGroup.rotation.y += 0.003;
            renderer.render(scene, camera);
        }

        function onMouseClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodes);
            if (intersects.length > 0) {
                const data = intersects[0].object.userData;
                document.getElementById('modal-name').innerText = data.name;
                document.getElementById('modal-tag').innerText = data.cat;
                document.getElementById('modal-bio').innerText = data.bio;
                document.getElementById('modal-overlay').classList.add('open');
                document.body.classList.add('modal-active');
            }
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('open');
            document.body.classList.remove('modal-active');
        }

        init();
    </script>
</body>
</html>
