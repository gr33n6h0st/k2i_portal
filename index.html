<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personnel Network Interface</title>
    <style>
        :root {
            --bg-color: #06080c;
            --panel-bg: rgba(10, 14, 22, 0.92);
            --border-color: rgba(45, 54, 69, 0.5);
            --text-main: #f0f3f6;
            --text-muted: #6e7681;
            
            /* High-Tech Categorization Palette */
            --color-camp-lead: #00bcff;
            --color-camp: #00ffd2;
            --color-wil-lead: #ff007f;
            --color-wil: #9d4edd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #network-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: grab;
        }
        #network-canvas:active {
            cursor: grabbing;
        }

        /* HUD Overlay Elements */
        header {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 10;
            pointer-events: none;
        }
        header h1 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 500;
            color: var(--text-main);
        }
        header p {
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            margin-top: 6px;
        }

        .legend {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 10;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            backdrop-filter: blur(10px);
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            color: #c9d1d9;
        }
        .legend-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            box-shadow: 0 0 8px currentColor;
        }

        /* Smooth Slide-out Profile Panel */
        .drawer {
            position: absolute;
            top: 0;
            right: -400px;
            width: 380px;
            height: 100%;
            background: var(--panel-bg);
            border-left: 1px solid var(--border-color);
            z-index: 20;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 50px 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            backdrop-filter: blur(16px);
        }
        .drawer.open {
            transform: translateX(-400px);
        }
        .close-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }
        .close-btn:hover { color: var(--text-main); }
        
        .drawer-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            padding: 5px;
            margin-bottom: 25px;
        }
        .drawer-name {
            font-size: 1.3rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .drawer-tag {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 4px 12px;
            border-radius: 2px;
            margin-bottom: 30px;
            font-weight: 600;
            background: rgba(255,255,255,0.05);
        }
        .drawer-bio {
            font-size: 0.85rem;
            line-height: 1.6;
            color: #afb8c1;
            text-align: center;
            border-top: 1px solid var(--border-color);
            padding-top: 25px;
            width: 100%;
        }

        .grid-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body>

    <div class="grid-overlay"></div>
    <canvas id="network-canvas"></canvas>

    <header>
        <h1>SYS_ORGANIZATION_MAP</h1>
        <p>ACTIVE NODE NETWORK // CATEGORIZED STRUCTURE</p>
    </header>

    <div class="legend">
        <div class="legend-item"><span class="legend-dot" style="color: var(--color-camp-lead); background: var(--color-camp-lead);"></span> Community Leads</div>
        <div class="legend-item"><span class="legend-dot" style="color: var(--color-camp); background: var(--color-camp);"></span> Community Camp</div>
        <div class="legend-item"><span class="legend-dot" style="color: var(--color-wil-lead); background: var(--color-wil-lead);"></span> Work-Integrated Learning Leads</div>
        <div class="legend-item"><span class="legend-dot" style="color: var(--color-wil); background: var(--color-wil);"></span> Work-Integrated Learning</div>
    </div>

    <div id="drawer" class="drawer">
        <button class="close-btn" onclick="closeDrawer()">×</button>
        <img id="drawer-img" class="drawer-avatar" src="" alt="">
        <h2 id="drawer-name" class="drawer-name"></h2>
        <span id="drawer-tag" class="drawer-tag"></span>
        <p id="drawer-bio" class="drawer-bio"></p>
    </div>

    <script>
        const canvas = document.getElementById('network-canvas');
        const ctx = canvas.getContext('2d');
        const drawer = document.getElementById('drawer');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const categories = {
            "Community Leads": { color: "#00bcff", bg: "rgba(0,188,255,0.08)", targetX: 0.3, targetY: 0.3 },
            "Community Camp": { color: "#00ffd2", bg: "rgba(0,255,210,0.08)", targetX: 0.3, targetY: 0.7 },
            "Work-Integrated Learning Leads": { color: "#ff007f", bg: "rgba(255,0,127,0.08)", targetX: 0.7, targetY: 0.3 },
            "Work-Integrated Learning": { color: "#9d4edd", bg: "rgba(157,78,221,0.08)", targetX: 0.7, targetY: 0.7 }
        };

        let nodes = [];
        let selectedNode = null;
        let hoveredNode = null;
        let isDraggingNode = false;

        // Physics Settings for Flowy Movements
        const gravityStrength = 0.04;
        const friction = 0.88;
        const repulseRadius = 90;
        const repulseStrength = 350;

        function generateData() {
            const catKeys = Object.keys(categories);
            const totalPeople = 45;

            // --- USER STEP: Replace this loop with your real 45-person array when ready ---
            for (let i = 0; i < totalPeople; i++) {
                let category;
                if (i < 4) category = catKeys[0];      // 4 Community Leads
                else if (i < 20) category = catKeys[1]; // 16 Community Camp
                else if (i < 24) category = catKeys[2]; // 4 WIL Leads
                else category = catKeys[3];             // 21 WIL Members

                nodes.push({
                    id: i,
                    name: `Staff Member ${i + 1}`,
                    category: category,
                    bio: `Systems operational profile data for specialized asset within the ${category} matrix department grid.`,
                    imgUrl: `https://i.pravatar.cc/150?img=${(i % 70) + 1}`,
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: 0,
                    vy: 0,
                    radius: 28,
                    imgObj: null
                });
            }

            // Image preloader with center-cropping handling
            nodes.forEach(node => {
                const img = new Image();
                img.src = node.imgUrl;
                img.onload = () => { node.imgObj = img; };
            });
        }

        // Live Physics Update Engine
        function updatePhysics() {
            for (let i = 0; i < nodes.length; i++) {
                let n1 = nodes[i];
                if (n1 === isDraggingNode) continue;

                // 1. Group Gravity: Pull nodes smoothly to their assigned Category sector quadrants
                let targetX = width * categories[n1.category].targetX;
                let targetY = height * categories[n1.category].targetY;
                
                n1.vx += (targetX - n1.x) * gravityStrength;
                n1.vy += (targetY - n1.y) * gravityStrength;

                // 2. Node Repulsion: Prevents overlap, forces layout to look organized but loose
                for (let j = i + 1; j < nodes.length; j++) {
                    let n2 = nodes[j];
                    let dx = n2.x - n1.x;
                    let dy = n2.y - n1.y;
                    let dist = Math.hypot(dx, dy);
                    let minDist = n1.radius + n2.radius + 25;

                    if (dist < minDist && dist > 0) {
                        let force = (minDist - dist) / minDist * repulseStrength;
                        let pushX = (dx / dist) * force * 0.1;
                        let pushY = (dy / dist) * force * 0.1;

                        n1.vx -= pushX;
                        n1.vy -= pushY;
                        n2.vx += pushX;
                        n2.vy += pushY;
                    }
                }

                // Apply velocity and drag friction
                n1.vx *= friction;
                n1.vy *= friction;
                n1.x += n1.vx;
                n1.y += n1.vy;

                // Contain nodes inside screen boundary walls cleanly
                n1.x = Math.max(n1.radius + 10, Math.min(width - n1.radius - 10, n1.x));
                n1.y = Math.max(n1.radius + 10, Math.min(height - n1.radius - 10, n1.y));
            }
        }

        // Render Frame Loop
        function draw() {
            updatePhysics();
            ctx.clearRect(0, 0, width, height);

            // 1. Draw Structural Network Connective Webbing
            ctx.lineWidth = 0.8;
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    let n1 = nodes[i];
                    let n2 = nodes[j];
                    let dist = Math.hypot(n2.x - n1.x, n2.y - n1.y);

                    // Draw clean line connections if they are in the same category and close by
                    if (n1.category === n2.category && dist < 160) {
                        ctx.beginPath();
                        ctx.moveTo(n1.x, n1.y);
                        ctx.lineTo(n2.x, n2.y);
                        ctx.strokeStyle = categories[n1.category].color + "1f"; // Smooth subtle opacity
                        ctx.stroke();
                    }
                }
            }

            // 2. Draw Floating Identity Nodes
            nodes.forEach(node => {
                ctx.save();
                ctx.translate(node.x, node.y);

                const accentColor = categories[node.category].color;
                const active = (hoveredNode === node || selectedNode === node);

                // Tech Outer Aura Ring
                ctx.beginPath();
                ctx.arc(0, 0, node.radius + 4, 0, Math.PI * 2);
                ctx.strokeStyle = active ? accentColor : "rgba(255, 255, 255, 0.08)";
                ctx.lineWidth = active ? 2 : 1;
                ctx.stroke();

                if (active) {
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = accentColor;
                }

                // Inner Masked Photo Area
                ctx.beginPath();
                ctx.arc(0, 0, node.radius, 0, Math.PI * 2);
                ctx.fillStyle = "#0c1017";
                ctx.fill();
                ctx.clip();

                // Advanced Centered Image Fitting (Aspect Ratio Lock, prevents stretching)
                if (node.imgObj) {
                    let img = node.imgObj;
                    let size = node.radius * 2;
                    let hRatio = img.width / size;
                    let vRatio = img.height / size;
                    let ratio  = Math.min(hRatio, vRatio);
                    let sWidth = size * ratio;
                    let sHeight = size * ratio;
                    let sX = (img.width - sWidth) / 2;
                    let sY = (img.height - sHeight) / 2;
                    
                    ctx.drawImage(img, sX, sY, sWidth, sHeight, -node.radius, -node.radius, size, size);
                }

                ctx.restore();

                // Draw Name text cleanly right beneath the circle node if hovered
                if (hoveredNode === node) {
                    ctx.font = "10px sans-serif";
                    ctx.fillStyle = "#ffffff";
                    ctx.textAlign = "center";
                    ctx.letterSpacing = "1px";
                    ctx.fillText(node.name.toUpperCase(), node.x, node.y + node.radius + 18);
                }
            });

            requestAnimationFrame(draw);
        }

        // Coordinate Matching & Pointer Actions
        function getNodeAtPos(x, y) {
            return nodes.find(node => Math.hypot(node.x - x, node.y - y) < node.radius + 8);
        }

        canvas.addEventListener('mousedown', (e) => {
            const clicked = getNodeAtPos(e.clientX, e.clientY);
            if (clicked) {
                isDraggingNode = clicked;
                selectedNode = clicked;
                openProfile(clicked);
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDraggingNode) {
                isDraggingNode.x = e.clientX;
                isDraggingNode.y = e.clientY;
                isDraggingNode.vx = 0;
                isDraggingNode.vy = 0;
            } else {
                hoveredNode = getNodeAtPos(e.clientX, e.clientY);
            }
        });

        window.addEventListener('mouseup', () => { isDraggingNode = false; });

        // Touch Support for Screens
        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const clicked = getNodeAtPos(touch.clientX, touch.clientY);
            if (clicked) { isDraggingNode = clicked; selectedNode = clicked; openProfile(clicked); }
        });
        canvas.addEventListener('touchmove', (e) => {
            if (!isDraggingNode) return;
            const touch = e.touches[0];
            isDraggingNode.x = touch.clientX;
            isDraggingNode.y = touch.clientY;
        });
        window.addEventListener('touchend', () => { isDraggingNode = false; });

        // Interface Drawer Slide Operations
        function openProfile(node) {
            document.getElementById('drawer-img').src = node.imgUrl;
            document.getElementById('drawer-name').innerText = node.name;
            
            const tag = document.getElementById('drawer-tag');
            tag.innerText = node.category;
            tag.style.color = categories[node.category].color;
            tag.style.border = `1px solid ${categories[node.category].color}33`;

            document.getElementById('drawer-bio').innerText = node.bio;
            drawer.classList.add('open');
        }

        function closeDrawer() {
            drawer.classList.remove('open');
            selectedNode = null;
        }

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // Start App
        generateData();
        requestAnimationFrame(draw);
    </script>
</body>
</html>
