<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The k2i Academy Team - Lassonde School of Engineering</title>
    <style>
        :root {
            --bg-color: #06080c;
            --modal-bg: rgba(10, 14, 22, 0.98);
            --border-color: rgba(45, 54, 69, 0.5);
            --text-main: #f0f3f6;
            --text-muted: #6e7681;
            
            --color-camp-lead: #00bcff;
            --color-camp: #00ffd2;
            --color-wil-lead: #ff007f;
            --color-wil: #9d4edd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            user-select: none;
        }

        /* Three.js Container */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: grab;
        }
        #canvas-container:active {
            cursor: grabbing;
        }

        body.modal-active #canvas-container {
            filter: blur(12px) brightness(0.2);
            pointer-events: none;
        }

        header {
            position: absolute;
            top: 35px;
            left: 35px;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.4s;
        }
        body.modal-active header { opacity: 0.05; }
        
        header h1 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 500;
        }
        header p {
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            margin-top: 5px;
        }

        /* Pure CSS HUD Labels over the 3D Engine */
        .hud-legend {
            position: absolute;
            bottom: 40px;
            left: 35px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        /* Premium Widescreen Dossier Card */
        .modal-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 30;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(6px);
        }
        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        
        .modal-card {
            background: var(--modal-bg);
            border: 1px solid var(--border-color);
            width: 750px;
            min-height: 280px;
            padding: 45px;
            border-radius: 8px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.85);
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 40px;
            transform: scale(0.94);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        .modal-overlay.open .modal-card {
            transform: scale(1);
        }
        .close-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.6rem;
            cursor: pointer;
            line-height: 1;
        }
        .close-btn:hover { color: var(--text-main); }

        .modal-left { flex-shrink: 0; }
        .modal-avatar {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            padding: 6px;
            border: 2px solid transparent;
            object-fit: cover;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        
        .modal-right {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }
        .modal-name {
            font-size: 1.8rem;
            font-weight: 400;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        .modal-tag {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            padding: 5px 16px;
            border-radius: 3px;
            margin-bottom: 20px;
            font-weight: 600;
            display: inline-block;
        }
        .modal-bio {
            font-size: 0.9rem;
            line-height: 1.7;
            color: #afb8c1;
            border-top: 1px solid var(--border-color);
            padding-top: 18px;
            width: 100%;
        }

        /* Clean Name Overlay when Hovering 3D Objects */
        #hover-label {
            position: absolute;
            z-index: 20;
            pointer-events: none;
            background: rgba(6, 8, 12, 0.9);
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: none;
            transform: translate(-50%, -140%);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="hover-label"></div>

    <header>
        <h1>The k2i Academy Team</h1>
        <p>Lassonde School of Engineering // 3D SPHERICAL MATRIX</p>
    </header>

    <div class="hud-legend">
        <div class="legend-item"><div class="legend-color" style="background: var(--color-camp-lead)"></div>Community Camp Leads</div>
        <div class="legend-item"><div class="legend-color" style="background: var(--color-camp)"></div>Community Camp Mentors</div>
        <div class="legend-item"><div class="legend-color" style="background: var(--color-wil-lead)"></div>Work-Integrated Learning Leads</div>
        <div class="legend-item"><div class="legend-color" style="background: var(--color-wil)"></div>Work-Integrated Learning Mentors</div>
    </div>

    <div id="modal-overlay" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-card">
            <button class="close-btn" onclick="forceCloseModal()">×</button>
            <div class="modal-left">
                <img id="modal-img" class="modal-avatar" src="" alt="">
            </div>
            <div class="modal-right">
                <h2 id="modal-name" class="modal-name"></h2>
                <span id="modal-tag" class="modal-tag"></span>
                <p id="modal-bio" class="modal-bio"></p>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('canvas-container');
        const hoverLabel = document.getElementById('hover-label');
        const modal = document.getElementById('modal-overlay');

        let scene, camera, renderer, globeGroup;
        let nodesArray = [];
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        
        // Interaction Tracking Variables
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let targetRotation = { x: 0, y: 0 };
        let currentRotation = { x: 0, y: 0 };
        let hoveredMesh = null;

        const categoryMeta = {
            "Community Camp Leads": { color: 0x00bcff, hexStr: "#00bcff", bg: "rgba(0,188,255,0.08)" },
            "Community Camp Mentors": { color: 0x00ffd2, hexStr: "#00ffd2", bg: "rgba(0,255,210,0.08)" },
            "Work-Integrated Learning Leads": { color: 0xff007f, hexStr: "#ff007f", bg: "rgba(255,0,127,0.08)" },
            "Work-Integrated Learning Mentors": { color: 0x9d4edd, hexStr: "#9d4edd", bg: "rgba(157,78,221,0.08)" }
        };

        function init3D() {
            // 1. Scene setup
            scene = new THREE.Scene();
            
            // 2. Camera setup
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 18;

            // 3. Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // 4. Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.4);
            dirLight.position.set(5, 5, 5);
            scene.add(dirLight);

            // Group to contain everything inside the globe
            globeGroup = new THREE.Group();
            scene.add(globeGroup);

            buildTeamSphere();
            addEventListeners();
            animate();
        }

        function buildTeamSphere() {
            const totalPeople = 45;
            const radius = 5.5; // Radius of the 3D globe structure
            const textureLoader = new THREE.TextureLoader();

            // Distribute all 45 nodes perfectly across 3D spherical coordinates using Fibonacci Sphere algorithm
            for (let i = 0; i < totalPeople; i++) {
                let category;
                if (i < 5) category = "Community Camp Leads";
                else if (i < 22) category = "Community Camp Mentors";
                else if (i < 27) category = "Work-Integrated Learning Leads";
                else category = "Work-Integrated Learning Mentors";

                const meta = categoryMeta[category];

                // Golden ratio spacing distribution (Math ensures zero structural stacking)
                const phi = Math.acos(1 - 2 * (i + 0.5) / totalPeople);
                const theta = Math.PI * (1 + Math.sqrt(5)) * (i + 0.5);

                const x = radius * Math.sin(phi) * Math.cos(theta);
                const y = radius * Math.sin(phi) * Math.sin(theta);
                const z = radius * Math.cos(phi);

                // Create Profile Node Geometry (Circular Disc Plane facing outwards)
                const geometry = new THREE.CircleGeometry(0.42, 32);
                
                // Outer tech ring boundary outline mesh
                const ringGeo = new THREE.RingGeometry(0.44, 0.46, 32);
                const ringMat = new THREE.MeshBasicMaterial({ color: meta.color, side: THREE.DoubleSide });
                const ringMesh = new THREE.Mesh(ringGeo, ringMat);

                // Profile Image placeholder texturing mapped to mesh faces
                const imgUrl = `https://i.pravatar.cc/150?img=${(i % 70) + 1}`;
                const material = new THREE.MeshBasicMaterial({
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.9
                });

                // Async image load processing
                textureLoader.load(imgUrl, (texture) => {
                    material.map = texture;
                    material.needsUpdate = true;
                });

                const mesh = new THREE.Mesh(geometry, material);
                mesh.add(ringMesh); // Nest outlining ring directly into the center node transform hierarchy

                // Position node elements on the 3D grid layout coordinates
                mesh.position.set(x, y, z);
                
                // Point meshes perfectly outward from center origin point to look like a clean grid panel globe
                mesh.lookAt(0, 0, 0);
                mesh.rotateY(Math.PI); // Invert face mapping so it looks directly at camera correctly

                // Store critical personnel dataset directly inside the mesh variables container object
                mesh.userData = {
                    id: i,
                    name: `Team Member ${i + 1}`,
                    category: category,
                    bio: `Dossier overview data matrix for k2i Academy team asset. Specialized in delivering engineering programming under the Lassonde School framework. Integrated 3D framework component system.`,
                    imgUrl: imgUrl,
                    baseScale: 1.0,
                    meta: meta
                };

                globeGroup.add(mesh);
                nodesArray.push(mesh);
            }

            // Draw structural constellations connecting lines between nodes inside categories
            Object.keys(categoryMeta).forEach(catKey => {
                const catMeshes = nodesArray.filter(m => m.userData.category === catKey);
                const lineMat = new THREE.LineBasicMaterial({ color: categoryMeta[catKey].color, transparent: true, opacity: 0.15 });
                
                for (let i = 0; i < catMeshes.length; i++) {
                    for (let j = i + 1; j < catMeshes.length; j++) {
                        let dist = catMeshes[i].position.distanceTo(catMeshes[j].position);
                        if (dist < 4.5) { // Connection threshold limit
                            const points = [catMeshes[i].position, catMeshes[j].position];
                            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
                            const line = new THREE.Line(lineGeo, lineMat);
                            globeGroup.add(line);
                        }
                    }
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            // Liquid rotation handling with automatic damping decay factor physics
            if (!isDragging) {
                targetRotation.y += 0.0015; // Slow ambient spin tracking rotation when idle
            }

            currentRotation.x += (targetRotation.x - currentRotation.x) * 0.1;
            currentRotation.y += (targetRotation.y - currentRotation.y) * 0.1;

            globeGroup.rotation.x = currentRotation.x;
            globeGroup.rotation.y = currentRotation.y;

            // Force profile ring elements to dynamically face perspective tracking camera coordinates
            nodesArray.forEach(node => {
                let targetScale = node.userData.baseScale;
                if (hoveredMesh === node) {
                    targetScale = 1.35; // Expand node size uniformly up on hover focus transitions
                }
                node.scale.set(targetScale, targetScale, targetScale);
            });

            renderer.render(scene, camera);
        }

        function addEventListeners() {
            window.addEventListener('resize', onWindowResize);
            
            // Interaction Event Maps
            window.addEventListener('mousedown', (e) => {
                if (document.body.classList.contains('modal-active')) return;
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            window.addEventListener('mousemove', onMouseMove);
            
            window.addEventListener('mouseup', () => { isDragging = false; });

            // Touch support
            window.addEventListener('touchstart', (e) => {
                if (document.body.classList.contains('modal-active')) return;
                isDragging = true;
                previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            });

            window.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                const deltaMove = {
                    x: e.touches[0].clientX - previousMousePosition.x,
                    y: e.touches[0].clientY - previousMousePosition.y
                };
                targetRotation.y += deltaMove.x * 0.005;
                targetRotation.x += deltaMove.y * 0.005;
                previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            });

            window.addEventListener('touchend', () => { isDragging = false; });

            window.addEventListener('click', onCanvasClick);
        }

        function onMouseMove(e) {
            // Drag navigation logic
            if (isDragging) {
                const deltaMove = {
                    x: e.clientX - previousMousePosition.x,
                    y: e.clientY - previousMousePosition.y
                };
                targetRotation.y += deltaMove.x * 0.005;
                targetRotation.x += deltaMove.y * 0.005;
                previousMousePosition = { x: e.clientX, y: e.clientY };
                return;
            }

            // Raycasting cursor detection loop
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodesArray);

            if (intersects.length > 0) {
                // Find nearest mesh object intercepting path vectors
                const hitMesh = intersects[0].object;
                
                if (hoveredMesh !== hitMesh) {
                    hoveredMesh = hitMesh;
                    container.style.cursor = 'pointer';
                    
                    // Show custom HUD text label tracking
                    hoverLabel.style.display = 'block';
                    hoverLabel.innerText = hoveredMesh.userData.name;
                    hoverLabel.style.borderColor = hoveredMesh.userData.meta.hexStr;
                    hoverLabel.style.color = "#ffffff";
                }
                
                // Track mouse coordinates dynamically for CSS tag positions
                hoverLabel.style.left = `${e.clientX}px`;
                hoverLabel.style.top = `${e.clientY}px`;
            } else {
                hoveredMesh = null;
                container.style.cursor = isDragging ? 'grabbing' : 'grab';
                hoverLabel.style.display = 'none';
            }
        }

        function onCanvasClick(e) {
            if (document.body.classList.contains('modal-active')) return;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodesArray);

            if (intersects.length > 0) {
                openModal(intersects[0].object.userData);
            }
        }

        function openModal(data) {
            document.getElementById('modal-img').src = data.imgUrl;
            document.getElementById('modal-img').style.borderColor = data.meta.hexStr;
            document.getElementById('modal-name').innerText = data.name;
            
            const tag = document.getElementById('modal-tag');
            tag.innerText = data.category;
            tag.style.color = data.meta.hexStr;
            tag.style.background = data.meta.bg;

            document.getElementById('modal-bio').innerText = data.bio;
            
            document.body.classList.add('modal-active');
            modal.classList.add('open');
        }

        function forceCloseModal() {
            modal.classList.remove('open');
            document.body.classList.remove('modal-active');
        }

        function closeModal(e) {
            if (e.target === modal) forceCloseModal();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Run framework execution stack components
        init3D();
    </script>
</body>
</html>
