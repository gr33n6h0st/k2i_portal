<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The k2i Academy Team - Lassonde School of Engineering</title>
    <style>
        :root {
            --bg-color: #000000;
            --modal-bg: rgba(10, 14, 22, 0.98);
            --border-color: rgba(45, 54, 69, 0.5);
            --text-main: #f0f3f6;
            --text-muted: #6e7681;
            --color-camp-lead: #00bcff;
            --color-camp: #00ffd2;
            --color-wil-lead: #ff007f;
            --color-wil: #9d4edd;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); overflow: hidden; width: 100vw; height: 100vh; user-select: none; }

        /* 3D Container */
        #stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background: #000; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; cursor: grab; }
        #canvas-container:active { cursor: grabbing; }
        body.modal-active #canvas-container { filter: blur(12px) brightness(0.2); pointer-events: none; }

        /* HUD & UI */
        header { position: absolute; top: 35px; left: 35px; z-index: 10; pointer-events: none; }
        header h1 { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 3px; font-weight: 500; }
        header p { font-size: 0.65rem; color: var(--text-muted); letter-spacing: 1.5px; margin-top: 5px; }

        .hud-legend { position: absolute; bottom: 40px; left: 35px; z-index: 10; display: flex; flex-direction: column; gap: 12px; }
        .legend-item { display: flex; align-items: center; gap: 10px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; cursor: pointer; padding: 5px; border-radius: 4px; transition: background 0.3s; }
        .legend-item:hover { background: rgba(255,255,255,0.05); }
        .legend-color { width: 12px; height: 12px; border-radius: 50%; }

        /* List Pop-up */
        .list-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; }
        .list-panel { background: var(--modal-bg); border: 1px solid var(--border-color); width: 400px; max-height: 80vh; padding: 40px; border-radius: 8px; box-shadow: 0 40px 80px rgba(0,0,0,0.85); display: flex; flex-direction: column; }
        .list-content { overflow-y: auto; flex-grow: 1; margin: 10px 0; }
        .list-title { font-size: 1.1rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-main); border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .list-member { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: color 0.2s; }
        .list-member:hover { color: var(--color-camp-lead); }
        .close-list-btn { margin-top: 20px; cursor: pointer; color: var(--text-muted); font-size: 0.8rem; text-align: center; border: 1px solid var(--border-color); padding: 10px; border-radius: 4px; }
        .close-list-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }

        /* Profile Modal */
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 30; background: rgba(0, 0, 0, 0.6); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1); backdrop-filter: blur(6px); }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal-card { background: var(--modal-bg); border: 1px solid var(--border-color); width: 750px; min-height: 280px; padding: 45px; border-radius: 8px; box-shadow: 0 40px 80px rgba(0,0,0,0.85); display: flex; flex-direction: row; align-items: center; gap: 40px; transform: scale(0.94); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); position: relative; }
        .modal-overlay.open .modal-card { transform: scale(1); }
        .close-btn { position: absolute; top: 25px; right: 25px; background: none; border: none; color: var(--text-muted); font-size: 1.6rem; cursor: pointer; line-height: 1; }
        .close-btn:hover { color: var(--text-main); }
        .modal-avatar { width: 180px; height: 180px; border-radius: 50%; padding: 6px; border: 2px solid transparent; object-fit: cover; }
        .modal-name { font-size: 1.8rem; font-weight: 400; margin-bottom: 8px; }
        .modal-tag { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2.5px; padding: 5px 16px; border-radius: 3px; margin-bottom: 20px; font-weight: 600; display: inline-block; }
        .modal-bio { font-size: 0.9rem; line-height: 1.7; color: #afb8c1; border-top: 1px solid var(--border-color); padding-top: 18px; }

        #hover-label { position: absolute; z-index: 20; pointer-events: none; background: rgba(6, 8, 12, 0.95); border: 1px solid var(--border-color); padding: 6px 14px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; display: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="stars"></div>
    <div id="canvas-container"></div>
    <div id="hover-label"></div>

    <header>
        <h1>The k2i Academy Team</h1>
        <p>Lassonde School of Engineering // 3D SPHERICAL MATRIX</p>
    </header>

    <div class="hud-legend">
        <div class="legend-item" onclick="openList('Community Camp Leads')"><div class="legend-color" style="background: var(--color-camp-lead)"></div>Community Camp Leads</div>
        <div class="legend-item" onclick="openList('Community Camp Mentors')"><div class="legend-color" style="background: var(--color-camp)"></div>Community Camp Mentors</div>
        <div class="legend-item" onclick="openList('Work-Integrated Learning Leads')"><div class="legend-color" style="background: var(--color-wil-lead)"></div>Work-Integrated Learning Leads</div>
        <div class="legend-item" onclick="openList('Work-Integrated Learning Mentors')"><div class="legend-color" style="background: var(--color-wil)"></div>Work-Integrated Learning Mentors</div>
    </div>

    <div id="list-overlay" class="list-overlay" onclick="closeList()">
        <div class="list-panel" onclick="event.stopPropagation()">
            <h2 id="list-title" class="list-title">Category</h2>
            <div id="list-content" class="list-content"></div>
            <div class="close-list-btn" onclick="closeList()">Close</div>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-card">
            <button class="close-btn" onclick="forceCloseModal()">×</button>
            <div class="modal-left"><img id="modal-img" class="modal-avatar" src="" alt=""></div>
            <div class="modal-right">
                <h2 id="modal-name" class="modal-name"></h2>
                <span id="modal-tag" class="modal-tag"></span>
                <p id="modal-bio" class="modal-bio"></p>
            </div>
        </div>
    </div>

    <script>
        const teamData = [

            { name: "Mithil Kansara", bio: "Mechanical Engineering", cat: "Work-Integrated Learning Mentors", img: "assets/20.jpg" },

            { name: "Arisa Arzan Pour", bio: "Computer Science", cat: "Work-Integrated Learning Mentors", img: "assets/38.jpg" },

            { name: "AARON XAVIER GONSALVES", bio: "Electrical Engineering", cat: "Work-Integrated Learning Mentors", img: "assets/41.jpg" },
            { name: "Heetva Gandhi", bio: "Life Sciences", cat: "Work-Integrated Learning Mentors", img: "assets/42.jpg" },
            { name: "Hanna Cole", bio: "Earth Science, Geophysics", cat: "Work-Integrated Learning Mentors", img: "assets/43.jpg" },
            { name: "Jethro Wignaraj", bio: "Mechanical Engineering", cat: "Work-Integrated Learning Mentors", img: "assets/44.jpg" },
            { name: "Anagha Koroth", bio: "Work-Integrated Learning Mentor", cat: "Work-Integrated Learning Mentors", img: "assets/45.jpg" },
            { name: "Westley Wong", bio: "Computer Science For Software Development", cat: "Work-Integrated Learning Mentors", img: "assets/46.jpg" }
        ];

        const categoryMeta = {
            "Community Camp Leads": { color: 0x00bcff, hexStr: "#00bcff", bg: "rgba(0,188,255,0.08)" },
            "Community Camp Mentors": { color: 0x00ffd2, hexStr: "#00ffd2", bg: "rgba(0,255,210,0.08)" },
            "Work-Integrated Learning Leads": { color: 0xff007f, hexStr: "#ff007f", bg: "rgba(255,0,127,0.08)" },
            "Work-Integrated Learning Mentors": { color: 0x9d4edd, hexStr: "#9d4edd", bg: "rgba(157,78,221,0.08)" }
        };

        // --- List UI ---
        function openList(cat) {
            const listOverlay = document.getElementById('list-overlay');
            const listContent = document.getElementById('list-content');
            document.getElementById('list-title').innerText = cat;
            listContent.innerHTML = '';
            teamData.filter(p => p.cat === cat).forEach(p => {
                const div = document.createElement('div');
                div.className = 'list-member';
                div.innerText = p.name;
                div.onclick = () => { closeList(); openModal(p); };
                listContent.appendChild(div);
            });
            listOverlay.style.display = 'flex';
        }
        function closeList() { document.getElementById('list-overlay').style.display = 'none'; }
        
        // --- Modal ---
        function openModal(data) {
            document.getElementById('modal-img').src = data.imgUrl;
            document.getElementById('modal-img').style.borderColor = categoryMeta[data.cat].hexStr;
            document.getElementById('modal-name').innerText = data.name;
            const tag = document.getElementById('modal-tag');
            tag.innerText = data.cat;
            tag.style.color = categoryMeta[data.cat].hexStr;
            tag.style.background = categoryMeta[data.cat].bg;
            document.getElementById('modal-bio').innerText = data.bio;
            document.body.classList.add('modal-active');
            document.getElementById('modal-overlay').classList.add('open');
        }
        function forceCloseModal() { document.getElementById('modal-overlay').classList.remove('open'); document.body.classList.remove('modal-active'); }
        function closeModal(e) { if (e.target.id === 'modal-overlay') forceCloseModal(); }

        // --- 3D Scene ---
        let scene, camera, renderer, globeGroup;
        let nodesArray = [], raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
        let isDragging = false, targetRotation = { x: 0, y: 0 }, currentRotation = { x: 0, y: 0 };
        let hoveredMesh = null;

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 17;
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            const stars = new THREE.Points(new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(Array.from({length: 6000}, () => (Math.random()-0.5)*100), 3)), new THREE.PointsMaterial({ color: 0xFFFFFF, size: 0.05 }));
            scene.add(stars);

            globeGroup = new THREE.Group();
            scene.add(globeGroup);

            const textureLoader = new THREE.TextureLoader();
            teamData.forEach((p, i) => {
                const phi = Math.acos(1 - 2 * (i + 0.5) / teamData.length);
                const theta = Math.PI * (1 + Math.sqrt(5)) * (i + 0.5);
                const mesh = new THREE.Mesh(new THREE.CircleGeometry(0.42, 32), new THREE.MeshBasicMaterial({ side: THREE.DoubleSide }));
                textureLoader.load(p.img, (tex) => { mesh.material.map = tex; mesh.material.needsUpdate = true; });
                mesh.position.set(5.5 * Math.sin(phi) * Math.cos(theta), 5.5 * Math.sin(phi) * Math.sin(theta), 5.5 * Math.cos(phi));
                mesh.lookAt(0,0,0); mesh.rotateY(Math.PI);
                mesh.userData = p;
                globeGroup.add(mesh);
                nodesArray.push(mesh);
            });

            window.addEventListener('mousedown', () => { isDragging = true; });
            window.addEventListener('mouseup', () => { isDragging = false; });
            window.addEventListener('mousemove', (e) => {
                if(isDragging) { targetRotation.y += e.movementX * 0.005; targetRotation.x += e.movementY * 0.005; }
                mouse.x = (e.clientX/window.innerWidth)*2-1; mouse.y = -(e.clientY/window.innerHeight)*2+1;
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(nodesArray);
                document.body.style.cursor = intersects.length > 0 ? 'pointer' : 'grab';
                hoveredMesh = intersects.length > 0 ? intersects[0].object : null;
            });
            window.addEventListener('click', () => { if(hoveredMesh) openModal(hoveredMesh.userData); });

            function animate() {
                requestAnimationFrame(animate);
                targetRotation.y += 0.0012;
                currentRotation.x += (targetRotation.x - currentRotation.x) * 0.1;
                currentRotation.y += (targetRotation.y - currentRotation.y) * 0.1;
                globeGroup.rotation.x = currentRotation.x;
                globeGroup.rotation.y = currentRotation.y;
                renderer.render(scene, camera);
            }
            animate();
        }
        init3D();
    </script>
</body>
</html>
