<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personnel Network Interface</title>
    <style>
        :root {
            --bg-color: #06080c;
            --panel-bg: rgba(10, 14, 22, 0.95);
            --border-color: rgba(45, 54, 69, 0.4);
            --text-main: #f0f3f6;
            --text-muted: #6e7681;
            
            /* Clean Sci-Fi Category Accent Palette */
            --color-camp-lead: #00bcff;
            --color-camp: #00ffd2;
            --color-wil-lead: #ff007f;
            --color-wil: #9d4edd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #network-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* HUD Header */
        header {
            position: absolute;
            top: 25px;
            left: 30px;
            z-index: 10;
            pointer-events: none;
        }
        header h1 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 500;
        }
        header p {
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            margin-top: 4px;
        }

        /* HTML Sector Headers for Clear Categorization */
        .sector-header {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            font-weight: 600;
            padding-bottom: 6px;
            width: 40%;
        }
        .sector-header::after {
            content: '';
            display: block;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, currentColor, transparent);
            margin-top: 6px;
            opacity: 0.4;
        }

        /* Position headers explicitly over the 4 quadrants */
        #header-camp-leads { top: 12%; left: 6%; color: var(--color-camp-lead); }
        #header-camp { top: 54%; left: 6%; color: var(--color-camp); }
        #header-wil-leads { top: 12%; left: 54%; color: var(--color-wil-lead); }
        #header-wil { top: 54%; left: 54%; color: var(--color-wil); }

        /* Smooth Slide-out Profile Panel */
        .drawer {
            position: absolute;
            top: 0;
            right: -400px;
            width: 380px;
            height: 100%;
            background: var(--panel-bg);
            border-left: 1px solid var(--border-color);
            z-index: 20;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 50px 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            backdrop-filter: blur(16px);
        }
        .drawer.open {
            transform: translateX(-400px);
        }
        .close-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }
        .close-btn:hover { color: var(--text-main); }
        
        .drawer-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            padding: 5px;
            margin-bottom: 25px;
        }
        .drawer-name {
            font-size: 1.3rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .drawer-tag {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 4px 12px;
            border-radius: 2px;
            margin-bottom: 30px;
            font-weight: 600;
            background: rgba(255,255,255,0.05);
        }
        .drawer-bio {
            font-size: 0.85rem;
            line-height: 1.6;
            color: #afb8c1;
            text-align: center;
            border-top: 1px solid var(--border-color);
            padding-top: 25px;
            width: 100%;
        }

        .grid-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body>

    <div class="grid-overlay"></div>
    <canvas id="network-canvas"></canvas>

    <header>
        <h1>CORE_PERSONNEL_MATRIX</h1>
        <p>SECURE INTERFACE // STABLE NETWORK GRID</p>
    </header>

    <div id="header-camp-leads" class="sector-header">Community Leads</div>
    <div id="header-camp" class="sector-header">Community Camp</div>
    <div id="header-wil-leads" class="sector-header">Work-Integrated Learning Leads</div>
    <div id="header-wil" class="sector-header">Work-Integrated Learning</div>

    <div id="drawer" class="drawer">
        <button class="close-btn" onclick="closeDrawer()">×</button>
        <img id="drawer-img" class="drawer-avatar" src="" alt="">
        <h2 id="drawer-name" class="drawer-name"></h2>
        <span id="drawer-tag" class="drawer-tag"></span>
        <p id="drawer-bio" class="drawer-bio"></p>
    </div>

    <script>
        const canvas = document.getElementById('network-canvas');
        const ctx = canvas.getContext('2d');
        const drawer = document.getElementById('drawer');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const categories = {
            "Community Leads": { color: "#00bcff", bounds: { minX: 0.05, maxX: 0.45, minY: 0.15, maxY: 0.45 } },
            "Community Camp": { color: "#00ffd2", bounds: { minX: 0.05, maxX: 0.45, minY: 0.58, maxY: 0.90 } },
            "Work-Integrated Learning Leads": { color: "#ff007f", bounds: { minX: 0.52, maxX: 0.92, minY: 0.15, maxY: 0.45 } },
            "Work-Integrated Learning": { color: "#9d4edd", bounds: { minX: 0.52, maxX: 0.92, minY: 0.58, maxY: 0.90 } }
        };

        let nodes = [];
        let hoveredNode = null;
        let selectedNode = null;

        function generateData() {
            const catKeys = Object.keys(categories);
            const totalPeople = 45;

            // Target counts per category to map out cleanly
            const counts = {
                "Community Leads": 4,
                "Community Camp": 16,
                "Work-Integrated Learning Leads": 4,
                "Work-Integrated Learning": 21
            };

            let tracker = { "Community Leads": 0, "Community Camp": 0, "Work-Integrated Learning Leads": 0, "Work-Integrated Learning": 0 };

            for (let i = 0; i < totalPeople; i++) {
                let category;
                if (i < 4) category = catKeys[0];
                else if (i < 20) category = catKeys[1];
                else if (i < 24) category = catKeys[2];
                else category = catKeys[3];

                let b = categories[category].bounds;
                let count = counts[category];
                let currentIdx = tracker[category]++;

                // Calculate neat grid coordinate layouts inside each section's boundary walls
                let cols = Math.ceil(Math.sqrt(count));
                let row = Math.floor(currentIdx / cols);
                let col = currentIdx % cols;
                
                let totalRows = Math.ceil(count / cols);

                // Math spacing distribution
                let pctX = cols > 1 ? col / (cols - 1) : 0.5;
                let pctY = totalRows > 1 ? row / (totalRows - 1) : 0.5;

                // Pad out edges gently so elements don't hug borders
                let padX = (b.maxX - b.minX) * 0.1;
                let padY = (b.maxY - b.minY) * 0.1;
                
                let x = width * (b.minX + padX + pctX * ((b.maxX - b.minX) - padX * 2));
                let y = height * (b.minY + padY + pctY * ((b.maxY - b.minY) - padY * 2));

                // Slight offset logic just to break rigid monotony, keeping it look like a high tech map
                if(count > 4) {
                    x += (Math.sin(currentIdx) * 15);
                    y += (Math.cos(currentIdx) * 15);
                }

                nodes.push({
                    id: i,
                    name: `Staff Member ${i + 1}`,
                    category: category,
                    bio: `Systems operational profile data for specialized asset within the ${category} matrix department grid.`,
                    imgUrl: `https://i.pravatar.cc/150?img=${(i % 70) + 1}`,
                    x: x,
                    y: y,
                    radius: 26,
                    imgObj: null
                });
            }

            nodes.forEach(node => {
                const img = new Image();
                img.src = node.imgUrl;
                img.onload = () => { node.imgObj = img; draw(); };
            });
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // 1. Draw Clean Structural Connected Webbing Lines for each Category
            Object.keys(categories).forEach(catKey => {
                let catNodes = nodes.filter(n => n.category === catKey);
                ctx.lineWidth = 1;
                ctx.strokeStyle = categories[catKey].color + "33"; // Clear, glowing structural lines

                ctx.beginPath();
                for (let i = 0; i < catNodes.length; i++) {
                    // Connect each node to its nearest neighbors within the category
                    for (let j = i + 1; j < catNodes.length; j++) {
                        let dist = Math.hypot(catNodes[j].x - catNodes[i].x, catNodes[j].y - catNodes[i].y);
                        // Ensures lines lock them together visually without becoming an over-the-top spiderweb
                        if (dist < width * 0.18) { 
                            ctx.moveTo(catNodes[i].x, catNodes[i].y);
                            ctx.lineTo(catNodes[j].x, catNodes[j].y);
                        }
                    }
                }
                ctx.stroke();
            });

            // 2. Draw Stable Identity Circles
            nodes.forEach(node => {
                ctx.save();
                ctx.translate(node.x, node.y);

                const accentColor = categories[node.category].color;
                const isHovered = (hoveredNode === node);
                const isSelected = (selectedNode === node);

                // High-tech Accent Rings
                ctx.beginPath();
                ctx.arc(0, 0, node.radius + 4, 0, Math.PI * 2);
                ctx.strokeStyle = (isHovered || isSelected) ? accentColor : "rgba(255, 255, 255, 0.08)";
                ctx.lineWidth = (isHovered || isSelected) ? 2 : 1;
                ctx.stroke();

                if (isHovered || isSelected) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = accentColor;
                }

                // Profile Image Masking Core
                ctx.beginPath();
                ctx.arc(0, 0, node.radius, 0, Math.PI * 2);
                ctx.fillStyle = "#0c1017";
                ctx.fill();
                ctx.clip();

                if (node.imgObj) {
                    let img = node.imgObj;
                    let size = node.radius * 2;
                    let hRatio = img.width / size;
                    let vRatio = img.height / size;
                    let ratio  = Math.min(hRatio, vRatio);
                    let sWidth = size * ratio;
                    let sHeight = size * ratio;
                    let sX = (img.width - sWidth) / 2;
                    let sY = (img.height - sHeight) / 2;
                    
                    ctx.drawImage(img, sX, sY, sWidth, sHeight, -node.radius, -node.radius, size, size);
                }
                ctx.restore();

                // Clean text label rendering
                if (isHovered) {
                    ctx.font = "10px sans-serif";
                    ctx.fillStyle = "#ffffff";
                    ctx.textAlign = "center";
                    ctx.letterSpacing = "1px";
                    ctx.fillText(node.name.toUpperCase(), node.x, node.y + node.radius + 18);
                }
            });
        }

        // Exact Hit Detection (No physics delays)
        function getNodeAtPos(x, y) {
            return nodes.find(node => Math.hypot(node.x - x, node.y - y) < node.radius + 6);
        }

        canvas.addEventListener('click', (e) => {
            const clicked = getNodeAtPos(e.clientX, e.clientY);
            if (clicked) {
                selectedNode = clicked;
                openProfile(clicked);
                draw();
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const prevHovered = hoveredNode;
            hoveredNode = getNodeAtPos(e.clientX, e.clientY);
            if (hoveredNode !== prevHovered) {
                draw();
            }
        });

        // UI Drawer Actions
        function openProfile(node) {
            document.getElementById('drawer-img').src = node.imgUrl;
            document.getElementById('drawer-name').innerText = node.name;
            
            const tag = document.getElementById('drawer-tag');
            tag.innerText = node.category;
            tag.style.color = categories[node.category].color;
            tag.style.border = `1px solid ${categories[node.category].color}33`;

            document.getElementById('drawer-bio').innerText = node.bio;
            drawer.classList.add('open');
        }

        function closeDrawer() {
            drawer.classList.remove('open');
            selectedNode = null;
            draw();
        }

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            // Recalculate layout paths cleanly on resize
            nodes = [];
            generateData();
        });

        // Initialization
        generateData();
    </script>
</body>
</html>
